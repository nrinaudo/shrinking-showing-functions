  case _          =>
    Stream.empty

--

* show a `Unit => C`.
--

* shrink a `Unit => C`.
--

* ... but only because its domain was of size 1.

        case true  => onTrue
        case false => onFalse
      }

    shrink(f(true)).map(b => bool(onTrue = b))   #:::
    shrink(f(false)).map(b => bool(onFalse = b))

  case _ =>
    Stream.empty
}

# `A =>> C`


```tut:invisible:reset
import com.nrinaudo.pbt._
import org.scalacheck._
import org.scalacheck.Prop._
import org.scalacheck.Arbitrary.arbitrary
import org.scalacheck.Shrink.shrink
import org.scalacheck.ScalacheckShapeless._
```

---

## `A =>> C`

```tut:silent
trait =>>[A, C] extends (A => C) {

  def table: List[(A, C)]

  def shrink(shrinkC: C => Stream[C]): Stream[A =>> C]

  override def toString = table.map { case (in, out) =>
    s"$in => $out" }.mkString("{", ", ", "}")
  }
```

---

## `A =>> C`

```tut:silent
def fun[A, C](
  eval    : A => C,
  values  : => List[(A, C)],
  shrinker: (C => Stream[C]) => Stream[A =>> C]
) = new (A =>> C) {

  override def apply(a: A) = eval(a)

  override def table = values

  override def shrink(shrinkC: C => Stream[C]) = shrinker(shrinkC)
}
```

---

## `Unit =>> C`

```tut:silent
def unit[C](f: Unit => C): (Unit =>> C) = fun(
  eval     = f,

  values   = List(() -> f()),

  shrinker = shrinkC => shrinkC(f()).map(c => unit(_ => c))
